apiVersion: apps/v1
kind: Deployment
metadata:
  name: profile-service
  namespace: portfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: profile-service
  template:
    metadata:
      labels:
        app: profile-service
    spec:
      containers:
        - name: profile-service
          image: portfolio-profile-service:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8085
          env:
            - name: SPRING_DATA_MONGODB_URI
              value: "mongodb://host.docker.internal:27017/microservice-portfolio"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://discovery-server:8671/eureka"
            - name: EUREKA_INSTANCE_HOSTNAME
              value: "profile-service.portfolio.svc.cluster.local"
            - name: EUREKA_INSTANCE_INSTANCE_ID
              value: "profile-service:8085"
            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "false"
---
apiVersion: v1
kind: Service
metadata:
  name: profile-service
  namespace: portfolio
spec:
  type: NodePort
  selector:
    app: profile-service
  ports:
    - port: 8085
      targetPort: 8085
      nodePort: 30885
