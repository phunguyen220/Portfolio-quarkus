apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-service
  namespace: portfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: image-service
  template:
    metadata:
      labels:
        app: image-service
    spec:
      containers:
        - name: image-service
          image: portfolio-image-service:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://host.docker.internal:3306/image?useSSL=false&serverTimezone=UTC&useLegacyDatetimeCode=false&allowPublicKeyRetrieval=true"
            - name: SPRING_DATASOURCE_USERNAME
              value: "root"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "123456"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://discovery-server:8671/eureka"
            - name: EUREKA_INSTANCE_HOSTNAME
              value: "image-service.portfolio.svc.cluster.local"
            - name: EUREKA_INSTANCE_INSTANCE_ID
              value: "image-service:8083"
            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "false"
---
apiVersion: v1
kind: Service
metadata:
  name: image-service
  namespace: portfolio
spec:
  type: NodePort
  selector:
    app: image-service
  ports:
    - port: 8083
      targetPort: 8083
      nodePort: 30883
