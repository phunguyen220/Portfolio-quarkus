apiVersion: apps/v1
kind: Deployment
metadata:
  name: email-service-quarkus
  namespace: portfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: email-service-quarkus
  template:
    metadata:
      labels:
        app: email-service-quarkus
    spec:
      containers:
        - name: email-service-quarkus
          image: portfolio-email-service-quarkus:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8087
          env:
            - name: QUARKUS_HTTP_HOST
              value: "0.0.0.0"

            - name: QUARKUS_HTTP_PORT
              value: "8087"
---
apiVersion: v1
kind: Service
metadata:
  name: email-service-quarkus
  namespace: portfolio
spec:
  type: NodePort
  selector:
    app: email-service-quarkus
  ports:
    - port: 8087
      targetPort: 8087
      nodePort: 30897