apiVersion: apps/v1
kind: Deployment
metadata:
  name: manager-service
  namespace: portfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: manager-service
  template:
    metadata:
      labels:
        app: manager-service
    spec:
      containers:
        - name: manager-service
          image: portfolio-manager-service:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8091
          env:
            - name: SPRING_DATA_MONGODB_URI
              value: "mongodb://host.docker.internal:27017/microservice-portfolio"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://discovery-server:8671/eureka"
            - name: EUREKA_INSTANCE_HOSTNAME
              value: "manager-service.portfolio.svc.cluster.local"
            - name: EUREKA_INSTANCE_INSTANCE_ID
              value: "manager-service:8091"
            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "false"
---
apiVersion: v1
kind: Service
metadata:
  name: manager-service
  namespace: portfolio
spec:
  type: NodePort
  selector:
    app: manager-service
  ports:
    - port: 8091
      targetPort: 8091
      nodePort: 30991
