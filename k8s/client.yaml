apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-client
  namespace: portfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio-client
  template:
    metadata:
      labels:
        app: portfolio-client
    spec:
      containers:
        - name: portfolio-client
          image: portfolio-client:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-client
  namespace: portfolio
spec:
  type: NodePort
  selector:
    app: portfolio-client
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30420
