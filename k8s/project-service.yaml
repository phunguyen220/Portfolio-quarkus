apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-service
  namespace: portfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: project-service
  template:
    metadata:
      labels:
        app: project-service
    spec:
      containers:
        - name: project-service
          image: portfolio-project-service:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8086
          env:
            - name: SPRING_APPLICATION_NAME
              value: "project-service"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://host.docker.internal:3306/project1?useSSL=false&serverTimezone=UTC&useLegacyDatetimeCode=false&allowPublicKeyRetrieval=true"
            - name: SPRING_DATASOURCE_USERNAME
              value: "root"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "123456"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://discovery-server:8671/eureka"
            - name: EUREKA_INSTANCE_HOSTNAME
              value: "project-service.portfolio.svc.cluster.local"
            - name: EUREKA_INSTANCE_INSTANCE_ID
              value: "project-service:8086"
            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "false"
---
apiVersion: v1
kind: Service
metadata:
  name: project-service
  namespace: portfolio
spec:
  type: NodePort
  selector:
    app: project-service
  ports:
    - port: 8086
      targetPort: 8086
      nodePort: 30886
