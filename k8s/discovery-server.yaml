apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-server
  namespace: portfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discovery-server
  template:
    metadata:
      labels:
        app: discovery-server
    spec:
      containers:
        - name: discovery-server
          image: portfolio-discovery-server:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8671
---
apiVersion: v1
kind: Service
metadata:
  name: discovery-server
  namespace: portfolio
spec:
  type: NodePort
  selector:
    app: discovery-server
  ports:
    - port: 8671
      targetPort: 8671
      nodePort: 30671
